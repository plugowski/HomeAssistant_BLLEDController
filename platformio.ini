; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
custom_project_name = BLLC
custom_project_codename = Balder
custom_version = 2.4.2 #BLLC_[Major].[Minor].[Patch]
; Pinned to the Arduino-ESP32 2.0.x toolchain. Newer Espressif platforms
; (Arduino 3.x / IDF 5.x) remove the tcpip_adapter_* API that ESP32SSDP@1.2.1
; still uses, which breaks the build. 6.9.0 ships Arduino-ESP32 2.0.17 / IDF 4.4.7.
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = littlefs
build_flags =
	-DVERSION=${this.custom_version}
	-DSTRVERSION=\""${this.custom_version}"\"
	-DCONFIG_ASYNC_TCP_STACK_SIZE=4096
	; -DDEBUG_WIFI_OFF              ; kill radio entirely (WiFi.mode(WIFI_OFF))
extra_scripts = 
	pre:pre_build.py
	merge_firmware.py
lib_deps = 
	bblanchon/ArduinoJson@7.4.2
	knolleary/pubsubclient@2.8.0
	luc-github/ESP32SSDP@1.2.1
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer
	mathieucarbou/MycilaWebSerial@^8.1.1
